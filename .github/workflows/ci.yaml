name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  build-and-test:
    runs-on: pub-hk-ubuntu-22.04-small
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Configure Poetry
        run: |
          poetry config virtualenvs.create true
          poetry config virtualenvs.in-project true

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-

      - name: Install dependencies (including test, lint, and typing)
        run: poetry install --with test,lint,typing

      - name: Run linting checks
        run: |
          poetry run ruff check .
          poetry run ruff format . --check

      - name: Run type checking
        run: poetry run mypy .

      - name: Run tests
        run: poetry run pytest --maxfail=1 --disable-warnings --tb=short

      - name: Run integration tests
        run: poetry run pytest tests/integration_tests/ --maxfail=1 --disable-warnings --tb=short

      - name: Upload pytest results (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: .pytest_cache 