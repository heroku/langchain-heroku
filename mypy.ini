[mypy]
python_version = 3.9
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
disallow_incomplete_defs = False

# Suppress some complex issues for demo scripts
[mypy-examples.*]
disallow_untyped_defs = False
disallow_incomplete_defs = False

# Allow untyped calls for complex LangGraph state issues
[mypy-tests.integration_tests.*]
disallow_untyped_calls = False
disallow_untyped_defs = False

# Third-party libraries
[mypy-sseclient.*]
ignore_missing_imports = True

[mypy-langchain_community.*]
ignore_missing_imports = True

[mypy-langgraph.*]
ignore_missing_imports = True

[mypy-sqlalchemy.*]
ignore_missing_imports = True